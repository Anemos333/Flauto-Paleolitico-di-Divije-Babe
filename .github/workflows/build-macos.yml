name: Build macOS VST3 (JUCE Projucer)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show repo files
        run: ls -R

      - name: List schemes
        run: |
          xcodebuild -list -project "Flauto paleolitico di Divije Babe.xcodeproj"

      - name: Build plugin
        run: |
          xcodebuild \
            -project "Flauto paleolitico di Divije Babe.xcodeproj" \
            -scheme "Flauto paleolitico di Divije Babe - All" \
            -configuration Release \
            BUILD_DIR=build \
            build

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: vst3-macos
          path: build/**/*.vst3
