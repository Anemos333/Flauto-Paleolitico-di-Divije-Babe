name: Build macOS VST3

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: brew install cmake

      - name: Show repository files
        run: ls -R

      - name: Verify Xcode projects
        run: |
          echo "=== Xcode projects found ==="
          find . -maxdepth 2 -name "*.xcodeproj" -print

      - name: Inspect project file
        run: |
          echo "=== First 30 lines of pbxproj ==="
          head -30 "Flauto paleolitico di Divije Babe.xcodeproj/project.pbxproj"

      - name: List schemes
        run: |
          xcodebuild -list -project "Flauto paleolitico di Divije Babe.xcodeproj"

      - name: Build VST3
        run: |
          xcodebuild \
            -project "Flauto paleolitico di Divije Babe.xcodeproj" \
            -scheme "Flauto paleolitico di Divije Babe - All" \
            -configuration Release \
            BUILD_DIR="$GITHUB_WORKSPACE/build" \
            build

      - name: Show build outputs
        run: |
          echo "=== Build products ==="
          find "$GITHUB_WORKSPACE/build" -name "*.vst3" -print || true

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vst3-macos
          path: build/**/*.vst3
          if-no-files-found: error
